<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">CAMP 90 Day Operating Loop</title>
  <desc id="desc">A four-step operating loop for CAMP execution over a 90-day cycle.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f3f7fd"/>
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#shell)"/>
  <rect x="42" y="38" width="1116" height="344" rx="24" fill="#ffffff" stroke="#dbe4f0"/>

  <text x="86" y="92" fill="#0f172a" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">90-Day CAMP Execution Loop</text>
  <text x="86" y="122" fill="#475569" font-size="17" font-family="Arial, Helvetica, sans-serif">A repeatable operating rhythm that links scoring to action and investor communication.</text>

  <g transform="translate(88 170)">
    <rect x="0" y="0" width="224" height="148" rx="16" fill="#eff6ff" stroke="#cfe0ff"/>
    <text x="20" y="36" fill="#1e3a8a" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="700">1. Diagnose</text>
    <text x="20" y="62" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">Score each CAMP pillar</text>
    <text x="20" y="84" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">with source-date notes.</text>

    <rect x="266" y="0" width="224" height="148" rx="16" fill="#ecfeff" stroke="#c8f2f7"/>
    <text x="286" y="36" fill="#0f766e" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="700">2. Allocate</text>
    <text x="286" y="62" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">Shift resources to the</text>
    <text x="286" y="84" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">highest confidence gap.</text>

    <rect x="532" y="0" width="224" height="148" rx="16" fill="#ecfdf5" stroke="#ccefdc"/>
    <text x="552" y="36" fill="#166534" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="700">3. Execute</text>
    <text x="552" y="62" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">Run owner-led weekly</text>
    <text x="552" y="84" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">variance reviews.</text>

    <rect x="798" y="0" width="224" height="148" rx="16" fill="#fff7ed" stroke="#f6dfc2"/>
    <text x="818" y="36" fill="#b45309" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="700">4. Report</text>
    <text x="818" y="62" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">Publish a decision memo</text>
    <text x="818" y="84" fill="#1f2937" font-size="14" font-family="Arial, Helvetica, sans-serif">to investors and team.</text>

    <line x1="224" y1="74" x2="254" y2="74" stroke="#334155" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="490" y1="74" x2="520" y2="74" stroke="#334155" stroke-width="3" marker-end="url(#arrowhead)"/>
    <line x1="756" y1="74" x2="786" y2="74" stroke="#334155" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
</svg>
